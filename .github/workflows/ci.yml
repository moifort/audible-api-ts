name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Type check
        run: bun tsc --noEmit

      - name: Lint
        run: bunx biome check

      - name: Unit tests
        run: bun test unit

      - name: Integration tests
        run: bun test int
        timeout-minutes: 5
        env:
          AUDIBLE_CREDENTIALS: ${{ secrets.AUDIBLE_CREDENTIALS }}

      - name: Build
        run: bun run build
