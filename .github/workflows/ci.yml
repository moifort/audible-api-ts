name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Type check
        run: bun tsc --noEmit

      - name: Lint
        run: bunx biome check

      - name: Test
        run: bun test

      - name: Build
        run: bun run build

  integration-tests:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: check
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Integration tests
        run: bun run test:int
        env:
          AUDIBLE_CREDENTIALS: ${{ secrets.AUDIBLE_CREDENTIALS }}
